# Configuration file

client {

    ##########################################################################################################
    # gui
    #--------------------------------------------------------------------------------------------------------#
    # Edit new gui.
    ##########################################################################################################

    gui {
        # Show baubles button or not [default: true]
        B:baublesButton=true

        # Columns of the wider sidebar [range: 2 ~ 5, default: 2]
        I:column=4

        # Gui needed baubles overlay [default: [vazkii.botania.client.gui.box.GuiBaubleBox], [cursedflames.bountifulbaubles.block.GuiReforger]]
        S:guiList <
            vazkii.botania.client.gui.box.GuiBaubleBox
            cursedflames.bountifulbaubles.block.GuiReforger
         >

        # Patch some containers such as BaubleBox. If false, it will patch after the selected key pressed [default: true]
        B:guiOverlay=true

        # Default visibility of the scroller bar [default: true]
        B:scrollerBar=true

        # Show the tip for baubles' type or not [default: true]
        B:typeTip=true

        # Show visible switchers or not [default: true]
        B:visibleSwitchers=true

        # Default selection of the sidebar [default: false]
        B:widerBar=true
    }

}


general {
    #  [default: [wct:wct]]
    S:clickBlacklist <
        wct:wct
     >

    #  [default: [items.json]]
    S:itemsJson <
        items.json
     >

    # Whether baubles can drop when player dies. [default: false]
    B:keepBaubles=false

    #  [default: ]
    S:modulesJson <
     >

    # Whether player can use right click to equip baubles. [default: true]
    B:rightClick=true

    #  [default: [types.json]]
    S:typesJson <
        types.json
     >

    ##########################################################################################################
    # compat
    #--------------------------------------------------------------------------------------------------------#
    # Toggle compatibility modifications
    ##########################################################################################################

    compat {
        # If true, will apply patches for aether_legacy [default: true]
        B:aether_legacy=true

        # If true, will apply patches for ancientspellcraft [default: true]
        B:ancientspellcraft=true

        # If true, will apply patches for ebwizardry [default: true]
        B:ebwizardry=true

        # If the NoClassDefFoundError occurs, please enter the method name here. [default: [artifacts.client.model.layer.LayerBauble.doRenderLayer], [keletu.enigmaticlegacy.client.LayerBauble.doRenderLayer], [rlmixins.client.layer.LayerQuarkBaubleHat.doRenderLayer], [com.keletu.ancienttweaks.baubles.client.LayerBeltJelly.doRenderLayer]]
        S:methodLocation <
            artifacts.client.model.layer.LayerBauble.doRenderLayer
            keletu.enigmaticlegacy.client.LayerBauble.doRenderLayer
            rlmixins.client.layer.LayerQuarkBaubleHat.doRenderLayer
            com.keletu.ancienttweaks.baubles.client.LayerBeltJelly.doRenderLayer
         >

        # If true, will apply patches for qualitytools [default: true]
        B:qualitytools=true

        # If true, will apply patches for wizardryutils [default: true]
        B:wizardryutils=true

        # If true, will apply patches for xat [default: true]
        B:xat=true
    }

    ##########################################################################################################
    # slots
    #--------------------------------------------------------------------------------------------------------#
    # Modify the quantity of initial baubles.
    ##########################################################################################################

    slots {
        # Set slots for amulet [range: 0 ~ 100, default: 1]
        I:amuletSlot=2

        # Set slots for bauble [range: 0 ~ 100, default: 0]
        I:baubleSlot=0

        # Set slots for belt [range: 0 ~ 100, default: 1]
        I:beltSlot=2

        # Set slots for body [range: 0 ~ 100, default: 1]
        I:bodySlot=2

        # Set slots for charm [range: 0 ~ 100, default: 1]
        I:charmSlot=4

        # Set slots for head [range: 0 ~ 100, default: 1]
        I:headSlot=2

        # Set slots for ring [range: 0 ~ 100, default: 2]
        I:ringSlot=10

        # Set slots for trinket [range: 0 ~ 100, default: 0]
        I:trinketSlot=2
    }

    ##########################################################################################################
    # items
    #--------------------------------------------------------------------------------------------------------#
    # Item modified by BaublesEX. (need to restart)
    ##########################################################################################################

    items {
        # Set elytra as bauble [default: false]
        B:elytraBauble=true

        # Get a specific slot for elytra [default: elytra]
        S:elytraSlot=elytra

        # The ring added by original Baubles [default: true]
        B:itemRing=true

        # Max level of haste given by Miner's Ring [range: 0 ~ 255, default: 1]
        I:maxLevel=1

        # For test, or you want [default: false]
        B:testItem=false

        # Set totem of undying as bauble [default: false]
        B:totemBauble=false

        # Get a specific slot for totem [default: charm]
        S:totemSlot=charm
    }

    commands {
        # Whether /baubles commands send logs when commands have executed successfully [default: true]
        B:commandLogs=true

        # Make /baubles debug commands available for use [default: false]
        B:debug=false

        # Whether /baubles clear will drop baubles [default: true]
        B:dropBaubles=true
    }

}


